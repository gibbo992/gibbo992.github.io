<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0c1626"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Trip OS"/>
<title>Trip OS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --shell:#0c1626; --shell-soft:#9fb0c9; --shell-line:#23344e;
  --canvas:#eef2f7; --surface:#ffffff; --paper:#f1f5f9;
  --ink:#0f1825; --sub:#697588; --line:#e4e9f1;
  --teal:#0e9b8a; --teal-ink:#0a6b5f; --teal-tint:#e4f4f1; --warm:#e0892b;
  --danger:#cf4a2e;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --r:16px; --shadow:0 1px 2px rgba(15,24,37,.05),0 10px 24px rgba(15,24,37,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--canvas);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
body{padding-bottom:80px;}
a{text-decoration:none;color:var(--teal-ink);}
button{font-family:inherit;cursor:pointer;}

/* top bar — dark app chrome */
.head{background:var(--shell);color:#fff;padding:calc(env(safe-area-inset-top) + 13px) 16px 13px;position:sticky;top:0;z-index:700;}
.headrow{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:680px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.05;}
.brand .bsub{display:block;font-size:9px;font-weight:700;letter-spacing:1.7px;text-transform:uppercase;color:var(--shell-soft);margin-top:2px;}
.installbtn{flex:0 0 auto;font-size:11px;font-weight:700;letter-spacing:.2px;border:1px solid var(--shell-line);color:#fff;background:rgba(255,255,255,.07);border-radius:9px;padding:7px 12px;}
.subhead{max-width:680px;margin:7px auto 0;font-size:11px;font-weight:600;letter-spacing:.2px;color:var(--shell-soft);}
.subhead b{color:#fff;}

.tabs{position:fixed;left:0;right:0;bottom:0;z-index:700;display:flex;background:var(--shell);padding:8px 12px calc(env(safe-area-inset-bottom) + 9px);border-top:1px solid var(--shell-line);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--shell-soft);padding:5px 4px;font-size:11px;font-weight:600;letter-spacing:.2px;border-radius:12px;}
.tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.85;stroke-linecap:round;stroke-linejoin:round;}
.tab.on{color:#fff;background:rgba(255,255,255,.07);}
.tab.on svg{stroke:var(--teal);}

.wrap{max-width:680px;margin:0 auto;padding:0 16px 36px;}
#map{height:56vh;min-height:340px;width:100%;border-radius:var(--r);border:1px solid var(--line);z-index:0;}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-top:14px;box-shadow:var(--shadow);}
.card.hl{box-shadow:0 0 0 2px var(--teal),var(--shadow);}
.lab{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--sub);margin:0 0 10px;}
.lab2{font-size:12px;font-weight:800;letter-spacing:.6px;color:var(--ink);margin:24px 0 11px;display:flex;align-items:center;gap:8px;}
.lab2:before{content:'';width:14px;height:2px;border-radius:2px;background:var(--teal);}
.muted{font-size:12.5px;color:var(--sub);line-height:1.5;}

/* chips / engine controls */
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.chip.sm{padding:7px 12px;font-size:12px;}
.sel{font-size:15px;font-weight:600;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;color:var(--ink);width:100%;-webkit-appearance:none;appearance:none;}
.wx{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--ink);margin-top:10px;}
.wxbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;padding:4px 9px;border-radius:999px;}
.dry{background:var(--teal);}.wet{background:#2f80c4;}.hot{background:var(--warm);}

/* suggestions */
.sug{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.sug.top{border-color:var(--teal);box-shadow:inset 4px 0 0 var(--teal),var(--shadow);}
.sugtop{display:flex;align-items:center;gap:8px;}
.sugname{font-size:16px;font-weight:700;flex:1;letter-spacing:-.2px;}
.pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:999px;background:var(--teal-tint);color:var(--teal-ink);border:none;}
.dots{font-family:var(--mono);font-size:11px;color:var(--warm);letter-spacing:1px;}
.why{font-size:13px;color:var(--sub);line-height:1.45;margin-top:6px;}
.acts{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;}
.act{font-size:12px;font-weight:700;letter-spacing:.2px;border-radius:9px;padding:8px 13px;border:1px solid var(--line);background:#fff;color:var(--ink);}
.act.go{border-color:transparent;color:#fff;background:var(--teal);}
.act.love{border-color:var(--teal);}
.act.done.on{background:var(--teal);color:#fff;border-color:var(--teal);}

.sleep{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:8px;padding:14px;margin-top:14px;}
.anchor{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--sub);margin-top:6px;}
.split{background:#fbeede;border:1px solid var(--warm);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:13px;color:#6b4a22;}
.banner{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--warm);border-radius:8px;padding:11px 13px;margin-top:12px;font-size:13.5px;line-height:1.5;}

/* taste / power bars */
.tw{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tw b{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);width:74px;}
.twtrack{flex:1;height:6px;background:#e1e6e0;border-radius:999px;overflow:hidden;}
.twtrack>i{display:block;height:100%;background:var(--teal);}
.twbtns button{border:1px solid var(--line);background:#fff;border-radius:6px;width:26px;height:26px;font-weight:800;color:var(--sub);}

/* ---- Route tab: departure, route strip, country cards ---- */
.depart{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:13px;}
.depart input[type=date]{font-family:var(--mono);font-size:13px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink);}
.depart .cd{color:var(--warm);font-weight:700;}
.route-strip{display:flex;align-items:center;overflow-x:auto;padding:4px 2px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-top:4px;}
.route-strip::-webkit-scrollbar{display:none;}
.route-node{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;color:var(--ink);padding:4px 2px;}
.route-oval{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.5px;border:2px solid var(--teal);background:#fff;color:var(--ink);border-radius:999px;padding:5px 11px;min-width:34px;text-align:center;}
.route-node span.cn{font-size:9.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;}
.route-conn{flex:0 0 18px;height:0;border-top:2px dashed var(--line);margin-top:-16px;}
.ch{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.ccode{font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.5px;border:2px solid var(--teal);color:var(--teal);border-radius:999px;padding:2px 9px;}
.cname{font-size:16px;font-weight:700;margin:0;}
.ccur{margin-left:auto;font-size:12px;color:var(--sub);font-family:var(--mono);white-space:nowrap;}
.ctoll{margin:0 0 6px;font-size:13.5px;line-height:1.45;}
.cextra{color:var(--sub);font-size:12.5px;line-height:1.4;margin:0;}

/* currency converter */
.row2{display:flex;gap:10px;}
.row2>div{flex:1;}
.field{margin-bottom:10px;}
.field label{display:block;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--sub);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;font-family:var(--sans);background:#fff;color:var(--ink);}
.field input[type=number]{font-family:var(--mono);}
.field textarea{min-height:58px;resize:vertical;}
.ratenote{font-size:12px;color:var(--sub);margin:6px 0 14px;}
.ratenote.live{color:var(--teal);}
.ratenote.err{color:var(--danger);}
.results{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
.rescell{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 6px;text-align:center;}
.rescell .cur{font-family:var(--mono);font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;}
.rescell .val{font-family:var(--mono);font-size:16px;margin-top:2px;}
table.ref{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;}
table.ref th,table.ref td{text-align:right;padding:6px 4px;border-bottom:1px solid var(--line);font-family:var(--mono);}
table.ref th{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);}
table.ref td:first-child,table.ref th:first-child{text-align:left;}

/* route weather grid */
.wgrid{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.wgrid::-webkit-scrollbar{display:none;}
.wcity{flex:0 0 auto;min-width:92px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 8px;text-align:center;}
.wcity .wn{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);}
.wcity .wt{font-family:var(--mono);font-size:20px;margin:4px 0 2px;}
.wcity .wd{font-size:10px;color:var(--sub);line-height:1.3;}

/* buttons (shared) */
.btn{font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;font-size:12px;font-weight:700;border:none;border-radius:8px;padding:11px 16px;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-ghost{background:none;color:var(--danger);padding:6px 8px;font-size:11px;font-weight:700;border:none;}

/* spots */
.spot-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.spot-name{font-weight:700;font-size:15px;}
.spot-tags{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--teal);margin-top:3px;}
.spot-notes{font-size:13.5px;margin:6px 0 4px;line-height:1.4;}
.empty{text-align:center;color:var(--sub);font-size:13px;padding:18px 10px;}

/* checklist */
.clgroup h3{font-family:var(--mono);font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--sub);margin:18px 0 8px;}
.clgroup:first-child h3{margin-top:0;}
.clitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;}
.clitem:last-child{border-bottom:none;}
.clitem input[type=checkbox]{margin-top:2px;width:18px;height:18px;accent-color:var(--teal);flex:0 0 18px;}
.clitem.done span{text-decoration:line-through;color:var(--sub);}
.addrow{display:flex;gap:8px;margin-top:14px;}
.addrow input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;}

/* daylight */
.dl-row{display:flex;gap:8px;}
.dl-cell{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 6px;text-align:center;}
.dl-k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);}
.dl-v{font-family:var(--mono);font-size:18px;margin-top:3px;}
.dl-gh{font-family:var(--mono);font-size:11.5px;color:var(--warm);margin-top:10px;letter-spacing:.2px;}
/* essentials */
.ess-112{background:var(--teal);color:#fff;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:13px;margin-bottom:12px;}
.ess-112 .big{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:1px;flex:0 0 auto;}
.ess-112 .lbl{font-size:12.5px;line-height:1.4;}
.ess details{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:#fff;}
.ess summary{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink);padding:11px 12px;cursor:pointer;list-style:none;}
.ess summary::-webkit-details-marker{display:none;}
.ess summary::after{content:'+';float:right;color:var(--teal);font-weight:700;}
.ess details[open] summary::after{content:'–';}
.ess .body{padding:0 12px 12px;font-size:13px;line-height:1.5;}
.ess .body .k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-top:9px;}
.phr{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-bottom:1px solid var(--line);}
.phr:last-child{border-bottom:none;}
.phr .en{color:var(--sub);font-size:13px;}.phr .tr{font-weight:600;text-align:right;font-size:13.5px;}
/* spend */
.spend-cat{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line);}
.spend-cat .mono{font-family:var(--mono);}
.spend-item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
.spend-item:last-child{border-bottom:none;}
.spend-h{font-size:14px;font-weight:600;}
.spend-n{font-size:12px;color:var(--sub);margin-top:2px;}
.spend-g{font-family:var(--mono);font-size:13px;color:var(--teal);white-space:nowrap;display:flex;align-items:center;gap:6px;}

.map-msg{padding:26px 18px;text-align:center;color:var(--sub);font-size:13px;line-height:1.5;}
.hostbanner{max-width:600px;margin:0 auto;padding:11px 14px;background:#fbeede;border:1px solid var(--warm);border-radius:10px;color:#6b4a22;font-size:13px;line-height:1.45;display:flex;gap:10px;align-items:flex-start;}
.hostbanner b{color:#6b4a22;}
.hostbanner button{flex:0 0 auto;border:none;background:none;color:#6b4a22;font-size:18px;line-height:1;cursor:pointer;padding:0 2px;}
.hostwrap{padding:4px 16px 0;}

/* collapsible info panels (grades, packraft) */
.grades{background:#fff;border:1px solid var(--line);border-radius:10px;padding:2px 14px;margin-bottom:9px;}
.grades summary{cursor:pointer;font-weight:700;font-size:15px;padding:11px 0;list-style:none;}
.grades summary::-webkit-details-marker{display:none;}
.grades summary:after{content:'';width:7px;height:7px;border-right:2px solid var(--teal);border-bottom:2px solid var(--teal);transform:rotate(45deg);float:right;margin-top:6px;transition:transform .2s;}
.grades[open] summary:after{transform:rotate(-135deg);margin-top:9px;}
.grades p{font-size:13.5px;line-height:1.55;margin:8px 0;}
.grades p.muted{color:var(--sub);}
/* via ferrata guidebook */
.vf{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:9px;}
.vf-top{display:flex;align-items:center;gap:8px;}
.vf-n{font-size:16px;font-weight:700;flex:1;}
.vf-g{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.5px;border:1px solid var(--warm);color:var(--warm);border-radius:6px;padding:2px 8px;white-space:nowrap;}
.vf-meta{font-family:var(--mono);font-size:11px;color:var(--sub);margin:6px 0 2px;letter-spacing:.2px;}
.vf-cond{margin-top:4px;}
.vf-verdict{border-radius:8px;padding:9px 11px;font-size:13px;font-weight:600;margin-top:8px;line-height:1.4;}
.vf-ok{background:#e7f3ec;color:#1d7a51;border:1px solid #a7d2b8;}
.vf-warn{background:#fbeede;color:#6b4a22;border:1px solid var(--warm);}
.vf-bad{background:#fbe7e1;color:#8f3320;border:1px solid #e0a08e;}
.vf-wx{font-family:var(--mono);font-size:11.5px;color:var(--sub);margin-top:6px;}
/* showers */
.shower-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
.shower-row:last-child{border-bottom:none;}
.shower-n{font-size:14px;font-weight:600;}
.shower-m{font-family:var(--mono);font-size:11px;color:var(--sub);margin-top:2px;}

/* dashboard hero */
.hero{margin-top:16px;}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow);min-width:0;}
.tile .k{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--sub);}
.tile .n{font-size:25px;font-weight:800;letter-spacing:-.6px;margin-top:5px;font-variant-numeric:tabular-nums;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tile .n small{font-size:13px;font-weight:700;color:var(--sub);letter-spacing:0;}
.tile .s{font-size:11.5px;color:var(--sub);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tile.accent{background:linear-gradient(140deg,#0e9b8a,#0a5f57);border-color:transparent;}
.tile.accent .k{color:rgba(255,255,255,.78);}
.tile.accent .n,.tile.accent .n small{color:#fff;}
.tile.accent .s{color:rgba(255,255,255,.9);}
.progress{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow);}
.progress .bar{height:9px;border-radius:999px;background:#dde4ee;overflow:hidden;}
.progress .bar>i{display:block;height:100%;background:linear-gradient(90deg,#0e9b8a,#39c5b2);border-radius:999px;}
.progress .pl{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--sub);margin-top:8px;}
.progress .pl b{color:var(--teal-ink);}

/* micro-interactions */
.chip,.act,.tab,.sug,.tile{transition:background .16s ease,color .16s ease,border-color .16s ease,transform .1s ease,box-shadow .16s ease;}
.chip:active,.act:active,.tab:active{transform:scale(.96);}
.sug:active{transform:scale(.995);}
@media(hover:hover){.chip:hover{border-color:var(--teal);}.act:hover{border-color:var(--teal);}.sug:hover{box-shadow:0 2px 4px rgba(15,24,37,.06),0 14px 30px rgba(15,24,37,.09);}}

:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style></head><body>
<div class="head">
  <div class="headrow">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="15.6 8.4 10.8 10.8 8.4 15.6 13.2 13.2" fill="#0e9b8a" stroke="none"/></svg>
      <span>Trip OS<span class="bsub">van expedition</span></span>
    </div>
    <button id="install" class="installbtn" hidden>Install</button>
  </div>
  <div class="subhead" id="subhead">UK → FR → CH → IT → home</div>
</div>
<div class="hostwrap" id="hostwrap"></div>
<div class="wrap"><div id="app"></div></div>
<div class="tabs">
  <button class="tab on" data-tab="now"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg><span>Today</span></button>
  <button class="tab" data-tab="map"><svg viewBox="0 0 24 24"><polygon points="3 6 9 4 15 6 21 4 21 18 15 20 9 18 3 20"/><path d="M9 4v14M15 6v14"/></svg><span>Map</span></button>
  <button class="tab" data-tab="ferrata"><svg viewBox="0 0 24 24"><path d="M3 20h18L14.5 7l-3.5 6-2-3z"/></svg><span>Ferrata</span></button>

<script>

function saveValue(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* shared working data */
let depDate=loadValue('van-departure-date','');

/* ===== helpers ===== */
function regionMeta(n){return REGIONS.find(r=>r.name===n);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function nextAnchor(fromISO){for(const a of ANCHORS){if(daysBetween(fromISO,a.date)>=0)return a;}return null;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ===== OSM gem discovery (Overpass — finds things you didn't plan) ===== */
function distKm(aLat,aLon,bLat,bLon){
  const R=6371,dLat=(bLat-aLat)*Math.PI/180,dLon=(bLon-aLon)*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(aLat*Math.PI/180)*Math.cos(bLat*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(s)));
}
function allExps(){let extra=[];const d=S.discovered||{};Object.keys(d).forEach(k=>{extra=extra.concat(d[k]||[]);});return POOL.concat(extra);}
const OSM_RULES=[
  {q:'node["natural"="waterfall"]',test:t=>t.natural==='waterfall',type:'explore',effort:1,kind:'Waterfall'},
  {q:'node["tourism"="viewpoint"]',test:t=>t.tourism==='viewpoint',type:'explore',effort:1,kind:'Viewpoint'},
  {q:'node["natural"="beach"]',test:t=>t.natural==='beach',type:'swim',effort:1,kind:'Beach'},
  {q:'way["natural"="beach"]',test:t=>t.natural==='beach',type:'swim',effort:1,kind:'Beach'},
  {q:'way["highway"="via_ferrata"]',test:t=>t.highway==='via_ferrata'||t['climbing:via_ferrata']==='yes',type:'ferrata',effort:3,kind:'Via ferrata'},
  {q:'node["sport"="climbing"]["climbing:via_ferrata"="yes"]',test:t=>t['climbing:via_ferrata']==='yes',type:'ferrata',effort:3,kind:'Via ferrata'}
];
let discovering=false;
function discoverBtn(){
  const m=regionMeta(S.region);
  if(!m||m.lat==null)return '<div class="muted" style="margin-top:10px">No coordinates for this stop — gem discovery unavailable here.</div>';
  const found=(S.discovered&&S.discovered[S.region])||[];
  const label=discovering?'Searching OpenStreetMap…':(found.length?(found.length+' gems found · search again'):'Find gems near here');
  return '<button class="chip sm" id="discover" style="margin-top:8px"'+(discovering?' disabled':'')+'>'+label+'</button><div class="muted" id="disc-note" style="margin-top:8px"></div>';
}
async function doDiscover(){
  const m=regionMeta(S.region); if(!m||m.lat==null||discovering)return;
  discovering=true; render();
  const R=15000;
  const body='[out:json][timeout:25];('+OSM_RULES.map(r=>r.q+'(around:'+R+','+m.lat+','+m.lon+');').join('')+');out center 80;';
  try{
    const j=await fetchJSON('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(body)},25000);
    const existing=POOL.filter(e=>e.region===S.region).concat((S.discovered&&S.discovered[S.region])||[]);
    const out=[],seen={};
    (j.elements||[]).forEach(el=>{
      const lat=el.lat!=null?el.lat:(el.center&&el.center.lat),lon=el.lon!=null?el.lon:(el.center&&el.center.lon);
      if(lat==null||lon==null)return;
      const tags=el.tags||{};
      const rule=OSM_RULES.find(r=>r.test(tags)); if(!rule)return;
      const name=tags.name||tags['name:en']||rule.kind;
      const key=name.toLowerCase()+'|'+lat.toFixed(3)+'|'+lon.toFixed(3); if(seen[key])return; seen[key]=1;
      const dup=existing.some(e=>e.name.toLowerCase()===name.toLowerCase()||(e.lat!=null&&distKm(e.lat,e.lon,lat,lon)===0));
      if(dup)return;
      const d=distKm(m.lat,m.lon,lat,lon);
      out.push({id:'osm-'+el.type[0]+el.id,name:name,type:rule.type,effort:rule.effort,lat:lat,lon:lon,region:S.region,
        waze:'https://waze.com/ul?ll='+lat+','+lon+'&navigate=yes',
        why:rule.kind+' · ~'+d+' km away · found on OpenStreetMap',osm:true});
    });
    out.sort((a,b)=>distKm(m.lat,m.lon,a.lat,a.lon)-distKm(m.lat,m.lon,b.lat,b.lon));
    S.discovered=S.discovered||{}; S.discovered[S.region]=out.slice(0,12); save();
    discovering=false; render();
    const n=document.getElementById('disc-note');
    if(n)n.textContent=S.discovered[S.region].length?(S.discovered[S.region].length+' new spots added to your picks and the map.'):'No new gems found nearby — your plan already covers this area.';
  }catch(e){
    discovering=false; render();
    const n=document.getElementById('disc-note');
    if(n)n.textContent="Couldn't reach OpenStreetMap — it needs a connection. Try again when you have signal.";
  }
}

/* ===== weather (region, drives the engine) ===== */
function wcat(code){return code>=51?'wet':'dry';}
async function fetchJSON(url,opts,ms){
  let ctrl=null,t=null;
  try{ if('AbortController' in window){ ctrl=new AbortController(); t=setTimeout(()=>ctrl.abort(),ms||8000); } }catch(e){}
  try{
    const r=await fetch(url,Object.assign({},opts||{},ctrl?{signal:ctrl.signal}:{}));
    if(!r.ok)throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { if(t)clearTimeout(t); }
}
async function fetchWx(m){
  try{
    const u='https://api.open-meteo.com/v1/forecast?latitude='+m.lat+'&longitude='+m.lon+'&current=temperature_2m,weather_code&daily=sunrise,sunset&timezone=auto';
    const j=await fetchJSON(u); if(!j.current)throw 0;
    const dl=j.daily||{};
    return {temp:Math.round(j.current.temperature_2m),code:j.current.weather_code,wet:wcat(j.current.weather_code)==='wet',hot:j.current.temperature_2m>=26,live:true,
      sunrise:dl.sunrise&&dl.sunrise[0],sunset:dl.sunset&&dl.sunset[0]};
  }catch(e){return null;}
}
/* daylight helpers (work purely off the two ISO timestamps — timezone-safe) */
function hm(iso){if(!iso)return null;const t=iso.split('T')[1];return t?t.slice(0,5):null;}
function minsOf(iso){if(!iso)return null;const p=hm(iso);if(!p)return null;const[h,m]=p.split(':').map(Number);return h*60+m;}
function fmtDur(mins){const h=Math.floor(mins/60),m=mins%60;return h+'h '+(m<10?'0':'')+m+'m';}
function addMins(iso,delta){const mm=minsOf(iso);if(mm==null)return null;let t=mm+delta;t=((t%1440)+1440)%1440;const h=Math.floor(t/60),m=t%60;return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;}
function daylightHtml(wx){
  if(!wx||!wx.sunrise||!wx.sunset)return '';
  const sr=hm(wx.sunrise),ss=hm(wx.sunset);
  const len=minsOf(wx.sunset)-minsOf(wx.sunrise);
  const ghPmStart=addMins(wx.sunset,-60), ghAmEnd=addMins(wx.sunrise,60);
  return '<div class="card"><div class="lab">Daylight — '+escapeHtml(S.region)+'</div>'
    +'<div class="dl-row"><div class="dl-cell"><div class="dl-k">Sunrise</div><div class="dl-v">'+sr+'</div></div>'
    +'<div class="dl-cell"><div class="dl-k">Sunset</div><div class="dl-v">'+ss+'</div></div>'
    +'<div class="dl-cell"><div class="dl-k">Day length</div><div class="dl-v">'+fmtDur(len)+'</div></div></div>'
    +'<div class="dl-gh">Golden hour ·  morning '+sr+'–'+ghAmEnd+'  ·  evening '+ghPmStart+'–'+ss+'</div>'
    +'<div class="muted" style="margin-top:6px">Aim to be parked up before '+ss+' for the easy mountain drives.</div></div>';
}

/* ===== scoring engine ===== */
function energyVal(){return (S.you+S.reb)/2;}
function ctxNow(){const wx=S.wx||{wet:S.manualWet,hot:S.manualHot,live:false};return {wet:wx.wet,hot:wx.hot,energy:energyVal(),load:S.load};}
function scoreExp(e,c){
  let s=(TYPE_APPEAL[e.type]!=null?TYPE_APPEAL[e.type]:2);
  if(c.wet){if(e.type==='ferrata')s-=4;if(e.type==='paddle')s-=2;if(e.type==='swim')s-=2;if(['coffee','village','explore','lake'].includes(e.type))s+=1;}
  if(c.hot){if(e.type==='swim')s+=2;if(e.type==='ferrata')s-=1;}
  if(!c.wet){if(e.type==='ferrata')s+=1;}
  if(c.energy>=1.5){if(e.effort>=2)s+=1;}else if(c.energy<=0.5){if(e.effort>=2)s-=3;if(e.effort<=1)s+=1;}
  if(c.load==='heavy'){if(e.effort>=2)s-=3;if(['swim','coffee','lake'].includes(e.type))s+=1.5;}
  else if(c.load==='some'){if(e.effort>=3)s-=1;}
  return s;
}

/* ===== map ===== */
let map=null,layer=null,mapOK=false;
function teardownMap(){ if(map){try{map.remove();}catch(e){}} map=null; layer=null; mapOK=false; }
function ensureMap(){
  if(mapOK&&map)return true;
  const el=document.getElementById('map'); if(!el)return false;
  if(!(window.L&&window.L.map)){
    el.innerHTML='<div class="map-msg">Map library didn\u2019t load — it needs a connection the first time. Reconnect and reopen this tab.</div>';
    return false;
  }
  try{
    map=L.map('map',{zoomControl:true,attributionControl:true}).setView([46.5,9],5);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap contributors'}).addTo(map);
    layer=L.layerGroup().addTo(map); mapOK=true;
  }catch(e){ mapOK=false; }
  return mapOK;
}
function drawMap(){
  if(!ensureMap())return;
  layer.clearLayers(); const b=[];
  allExps().filter(e=>S.filter==='all'||e.type===S.filter).forEach(e=>{
    if(e.lat==null||e.lon==null)return;
    const col=TYPECOL[e.type]||'#555';
    const mk=e.osm
      ? L.circleMarker([e.lat,e.lon],{radius:6,color:col,weight:2.5,fillColor:'#fff',fillOpacity:1}).addTo(layer)
      : L.circleMarker([e.lat,e.lon],{radius:6,color:'#fff',weight:1.5,fillColor:col,fillOpacity:1}).addTo(layer);
    mk.bindPopup('<b>'+e.name+'</b><br>'+(e.osm?'found · ':'')+e.type+' · '+e.region+'<br><a href="'+e.waze+'" target="_blank">Navigate</a>');
    b.push([e.lat,e.lon]);
  });
  if(S.filter==='all'||S.filter==='shower'){
    allShowers().forEach(s=>{
      if(s.lat==null||s.lon==null)return;
      const mk=L.circleMarker([s.lat,s.lon],{radius:6,color:'#fff',weight:1.5,fillColor:PAL.blue,fillOpacity:1}).addTo(layer);
      mk.bindPopup('<b>'+s.name+'</b><br>shower'+(s.fee?' · '+s.fee:'')+'<br><a href="'+s.waze+'" target="_blank">Navigate</a>');
      b.push([s.lat,s.lon]);
    });
  }
  if(S.filter==='all'||S.filter==='packraft'){
    PACKRAFT.forEach(p=>{
      const mk=L.circleMarker([p.lat,p.lon],{radius:6,color:'#fff',weight:1.5,fillColor:PAL.teal,fillOpacity:1}).addTo(layer);
      mk.bindPopup('<b>'+p.n+'</b><br>packraft / paddle hire<br><a href="https://waze.com/ul?ll='+p.lat+','+p.lon+'&navigate=yes" target="_blank">Navigate</a> · <a href="'+p.url+'" target="_blank">Website ↗</a>');
      b.push([p.lat,p.lon]);
    });
  }
  if(S.filter==='all'||S.filter==='aire'){
    allAires().forEach(s=>{
      if(s.lat==null||s.lon==null)return;
      const mk=L.circleMarker([s.lat,s.lon],{radius:6,color:'#fff',weight:1.5,fillColor:PAL.amber,fillOpacity:1}).addTo(layer);
      mk.bindPopup('<b>'+s.name+'</b><br>aire / camper stop<br><a href="'+s.waze+'" target="_blank">Navigate</a>');
      b.push([s.lat,s.lon]);
    });
  }
  if(S.filter==='all'||S.filter==='ferrata'){
    allFerrata().forEach(f=>{
      if(f.lat==null||f.lon==null)return;
      const mk=L.circleMarker([f.lat,f.lon],{radius:6,color:'#fff',weight:1.5,fillColor:PAL.terra,fillOpacity:1}).addTo(layer);
      const det=[f.v,f.t,f.s].filter(Boolean).join(' · ');
      mk.bindPopup('<b>'+f.n+'</b><br>via ferrata · grade '+f.g+' · '+f.region+(det?'<br>'+det:'')+'<br><a href="https://waze.com/ul?ll='+f.lat+','+f.lon+'&navigate=yes" target="_blank">Navigate</a> · <a href="https://www.google.com/search?q='+encodeURIComponent(f.n+' '+(f.region==='Switzerland'?'klettersteig':'via ferrata')+' topo')+'" target="_blank">Topo ↗</a>');
      b.push([f.lat,f.lon]);
    });
  }
  // invalidate AFTER the container has laid out, then fit — prevents grey/half-loaded tiles
  const finish=()=>{ if(!mapOK||!map)return; map.invalidateSize(); if(b.length)map.fitBounds(b,{padding:[30,30],maxZoom:12}); };
  requestAnimationFrame(()=>setTimeout(finish,60));
}

/* ===== render dispatch ===== */
const A=document.getElementById('app');
function setTab(t){S.tab=t;save();render();}
function render(){
  if(!['now','map','ferrata'].includes(S.tab))S.tab='now';
  if(S.tab!=='map')teardownMap();   // release Leaflet when leaving the map so it rebuilds clean next time
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.getAttribute('data-tab')===S.tab));
  if(S.tab==='map')renderMap();
  else if(S.tab==='ferrata')renderFerrata();
  else renderNow();
}
function effDots(n){return '●'.repeat(n)+'○'.repeat(3-n);}

/* ===== dashboard hero ===== */
const TRIP={start:'2026-06-27',days:44};
function tripDay(){const n=daysBetween(TRIP.start,new Date().toISOString().slice(0,10))+1;return Math.max(1,Math.min(TRIP.days,n));}
function dashHero(){
  const m=regionMeta(S.region); const wx=S.wx;
  const day=tripDay(); const pct=Math.round(day/TRIP.days*100);
  const todayISO=new Date().toISOString().slice(0,10);
  const na=nextAnchor(todayISO);
  let nextN='Trip complete', nextS='you made it';
  if(na){const dd=daysBetween(todayISO,na.date);nextN=na.name;nextS=dd<=0?'today':('in '+dd+' day'+(dd===1?'':'s'));}
  const condN = wx?(wx.temp+'°C'):'—';
  const condS = wx?(wx.wet?'wet — slippery rock':(wx.hot?'hot — find water':'dry — good to go')):'set weather below';
  const sleep = m&&m.sleep ? (m.sleep.length>30?m.sleep.slice(0,28)+'…':m.sleep) : 'pick a stop';
  let h='<div class="hero"><div class="tiles">';
  h+='<div class="tile accent"><div class="k">Trip day</div><div class="n">'+day+'<small> / '+TRIP.days+'</small></div><div class="s">'+pct+'% complete</div></div>';
  h+='<div class="tile"><div class="k">Next anchor</div><div class="n" style="font-size:17px">'+escapeHtml(nextN)+'</div><div class="s">'+nextS+'</div></div>';
  h+='<div class="tile"><div class="k">Current base</div><div class="n" style="font-size:17px">'+escapeHtml(S.region)+'</div><div class="s">'+escapeHtml(sleep)+'</div></div>';
  h+='<div class="tile"><div class="k">Conditions</div><div class="n">'+condN+'</div><div class="s">'+condS+'</div></div>';
  h+='</div><div class="progress"><div class="bar"><i style="width:'+pct+'%"></i></div><div class="pl"><span>'+escapeHtml(REGIONS[0].name)+'</span><span><b>Day '+day+'</b></span><span>Home</span></div></div></div>';
  return h;
}
function renderNow(){
  const m=regionMeta(S.region); const c=ctxNow();
  const regExps=POOL.filter(e=>e.region===S.region).concat((S.discovered&&S.discovered[S.region])||[]);

  const wx=S.wx;

  h+='<select class="sel" id="regsel">'+REGIONS.map(r=>'<option'+(r.name===S.region?' selected':'')+'>'+r.name+'</option>').join('')+'</select>';
  h+='<button class="chip sm" id="geo" style="margin-top:8px"'+(geoBusy?' disabled':'')+'>'+(geoBusy?'Locating…':'Use my location')+'</button>';
  if(geoMsg)h+='<div class="muted" id="geo-note" style="margin-top:6px">'+geoMsg+'</div>';
  h+=discoverBtn();
  h+=showersBtn();
  h+=airesBtn();
  if(wx){h+='<div class="wx"><span class="wxbadge '+(wx.wet?'wet':(wx.hot?'hot':'dry'))+'">'+(wx.wet?'Wet':(wx.hot?'Hot':'Dry'))+'</span><span>'+wx.temp+'°C'+(wx.live?' · live':'')+'</span></div>';}
  else{h+='<div class="lab" style="margin:14px 0 7px">Weather (tap if no signal)</div>'+(wxFailed?'<div class="muted" style="margin:0 0 8px;color:var(--warm)">Couldn\u2019t reach live weather — set it manually.</div>':'')+'<div class="chips"><button class="chip sm '+(!S.manualWet?'on':'')+'" data-wx="dry">Dry</button><button class="chip sm '+(S.manualWet?'on':'')+'" data-wx="wet">Wet</button><button class="chip sm '+(S.manualHot?'on':'')+'" data-wx="hot">Hot</button></div>';}
  h+='</div>';

  h+=daylightHtml(wx);

  h+='<div class="card"><div class="lab">Energy — you</div><div class="chips">'+[['Fresh',2],['OK',1],['Low',0]].map(o=>'<button class="chip sm '+(S.you===o[1]?'on':'')+'" data-you="'+o[1]+'">'+o[0]+'</button>').join('')+'</div>';
  h+='<div class="lab" style="margin-top:14px">Energy — Rebecca</div><div class="chips">'+[['Fresh',2],['OK',1],['Low',0]].map(o=>'<button class="chip sm '+(S.reb===o[1]?'on':'')+'" data-reb="'+o[1]+'">'+o[0]+'</button>').join('')+'</div>';
  h+='<div class="lab" style="margin-top:14px">Recent effort</div><div class="chips">'+[['Rested','rested'],['Some','some'],['Heavy','heavy']].map(o=>'<button class="chip sm '+(S.load===o[1]?'on':'')+'" data-load="'+o[1]+'">'+o[0]+'</button>').join('')+'</div></div>';

  if(Math.abs(S.you-S.reb)>=2){h+='<div class="split"><b>Split day?</b> You two are far apart on energy — maybe one does a big route while the other takes a swim-and-coffee, regroup for dinner.</div>';}
  if(c.load==='heavy'){h+='<div class="banner"><b>Recovery suggested.</b> You\'ve logged some hard days — the picks below lean gentle on purpose.</div>';}

  h+='<div class="lab2">What to do — '+S.region+'</div>';
  if(!pool.length){h+='<div class="muted">No options seeded here yet.</div>';}
  pool.slice(0,6).forEach((p,i)=>{
    const e=p.e;
    h+='<div class="sug'+(i===0&&p.s>0?' top':'')+'"><div class="sugtop"><span class="sugname">'+e.name+'</span><span class="pill">'+e.type+'</span>'+(e.osm?'<span class="pill" style="border-color:var(--warm);color:var(--warm)">found</span>':'')+'<span class="dots">'+effDots(e.effort)+'</span></div>';
    if(e.why)h+='<div class="why">'+e.why+'</div>';
    h+='<div class="acts"><a class="act go" href="'+e.waze+'" target="_blank">Navigate</a></div></div>';
  });

  if(m){h+='<div class="sleep"><div class="lab" style="margin:0 0 6px">Tonight</div><div style="font-weight:600">'+(m.sleep||'(pick a spot)')+'</div>';
    const na=nextAnchor(m.arrival);
    if(na){const dd=daysBetween(m.arrival,na.date);h+='<div class="anchor"><span>Next anchor: '+na.name+'</span><span>'+(dd<=0?'now':dd+' days')+'</span></div>';}
    h+='</div>';}
  h+=packraftCard();
  h+='<div style="text-align:center;margin-top:20px"><button class="chip sm" id="reset">Reset app data</button></div>';
  A.innerHTML=h;
}

/* ===== SHOWERS (public shower directory via OSM) ===== */
function allShowers(){let out=[];const d=S.showers||{};Object.keys(d).forEach(k=>{out=out.concat(d[k]||[]);});return out;}
let showering=false;
function showersBtn(){
  const m=regionMeta(S.region);
  if(!m||m.lat==null)return '';
  const found=(S.showers&&S.showers[S.region])||[];
  const label=showering?'Searching showers…':(found.length?(found.length+' showers found · search again'):'Find public showers');
  return '<button class="chip sm" id="showers" style="margin-top:8px"'+(showering?' disabled':'')+'>'+label+'</button> <a class="chip sm" href="https://showersdirectory.com/" target="_blank" rel="noopener" style="margin-top:8px;text-decoration:none">ShowersDirectory ↗</a><div class="muted" id="show-note" style="margin-top:8px"></div>'+showerList();
}
function showerList(){
  const found=(S.showers&&S.showers[S.region])||[];
  if(!found.length)return '';
  let h='<div style="margin-top:10px">';

async function doShowers(){
  const m=regionMeta(S.region); if(!m||m.lat==null||showering)return;
  showering=true; render();
  const R=15000;
  const body='[out:json][timeout:25];(node(around:'+R+','+m.lat+','+m.lon+')[amenity=shower];way(around:'+R+','+m.lat+','+m.lon+')[amenity=shower];);out center 60;';
  try{
    const j=await fetchJSON('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(body)},25000);
    const out=[],seen={};
    // OSM amenity=shower also tags showers at refuges and social services; screen those out.
    const SOCIAL=/(homeless|sans[\s-]?abri|\bsdf\b|shelter|refuge|foyer|secours|samu|croix[\s-]?rouge|red[\s-]?cross|caritas|emma(?:ü|u)s|restos?\s+du\s+c|arm[ée]+e?\s+du\s+salut|salvation|accueil\s+de\s+jour|\bccas\b|diacon|sans[\s-]?domicile|migrant|asile|asylum|abrigo|albergue|obdach)/i;
    let dropped=0;
    (j.elements||[]).forEach(el=>{
      const lat=el.lat!=null?el.lat:(el.center&&el.center.lat),lon=el.lon!=null?el.lon:(el.center&&el.center.lon);
      if(lat==null||lon==null)return;
      const tg=el.tags||{};
      // skip social-facility showers and non-public access
      const hay=[tg.name,tg.operator,tg.description,tg['social_facility'],tg['social_facility:for'],tg.operator_type].filter(Boolean).join(' ');
      if(tg.social_facility||tg['social_facility:for']||tg.healthcare||SOCIAL.test(hay)){dropped++;return;}
      if(tg.access==='private'||tg.access==='no'){dropped++;return;}
      const name=tg.name||tg.operator||'Public shower';
      const key=name.toLowerCase()+'|'+lat.toFixed(3)+'|'+lon.toFixed(3); if(seen[key])return; seen[key]=1;
      const bits=[]; if(tg.fee==='yes')bits.push('paid'); else if(tg.fee==='no')bits.push('free'); if(tg['shower:hot']==='yes'||tg.hot_water==='yes')bits.push('hot'); if(tg.access&&tg.access!=='yes')bits.push(tg.access);
      const d=distKm(m.lat,m.lon,lat,lon);
      out.push({id:'sh-'+el.type[0]+el.id,name:name,lat:lat,lon:lon,fee:tg.fee==='yes'?'paid':(tg.fee==='no'?'free':''),meta:(bits.length?bits.join(' · ')+' · ':'')+'~'+d+' km',waze:'https://waze.com/ul?ll='+lat+','+lon+'&navigate=yes',d:d});
    });
    out.sort((a,b)=>a.d-b.d);
    S.showers=S.showers||{}; S.showers[S.region]=out.slice(0,15); save();
    showering=false; render();
    const n=document.getElementById('show-note');
    if(n)n.textContent=(out.length?(out.length+' showers from OpenStreetMap'+(dropped?' ('+dropped+' social-service/private filtered out)':'')+' — also try campsites, marinas, pools and beach taps.'):'No suitable public showers mapped within 15 km — campsites, marinas, municipal pools and beach showers are your best bet.')+' Listings are community-mapped, so double-check before relying on one.';
  }catch(e){
    showering=false; render();
    const n=document.getElementById('show-note');
    if(n)n.textContent="Couldn\u2019t reach the shower directory — needs a connection. Try again when you have signal.";
  }
}

function packraftCard(){

function vfDomId(region,i){return region.replace(/[^a-z]/gi,'')+i;}
function renderFerrata(){
  let h='<div class="card"><div class="lab">Via ferrata guidebook</div><div class="muted">Offline route notes for the French Alps, Dolomites and Switzerland. Tap <b>Conditions</b> for live weather guidance at the route, or <b>Navigate</b> to drive there.</div></div>';

    +'<p><b>Dolomites (1–6 + A–C)</b> — a <b>number</b> for technical difficulty (1 easy → 6 extreme) and a <b>letter</b> for seriousness/commitment (A short and low → C long, high and remote). So <b>2A</b> is an easy outing; <b>5C</b> is a hard, committing mountain day.</p>'
    +'<p><b>German / Swiss (K1–K6)</b> — <b>K1</b> easy → <b>K6</b> extreme, the most widely used Klettersteig scale (you\u2019ll also see A–F meaning the same).</p>'
    +'<p><b>Rough cross-read:</b> F ≈ 1–2 ≈ K1–K2 · PD ≈ 2–3 ≈ K2–K3 · D ≈ 3–4 ≈ K3–K4 · TD ≈ 4–5 ≈ K4–K5 · ED ≈ 5–6 ≈ K5–K6. Treat it as a guide, not a promise — exposure, length and altitude change how hard a route feels.</p>'
    +'<p class="muted">A proper via ferrata set (harness, lanyard with shock absorber, helmet) and dry conditions are non-negotiable on anything above the easiest routes.</p></details>';
  Object.keys(FERRATA).forEach(region=>{

      h+='<div class="vf-meta">'+[f.v,f.t,f.s].filter(Boolean).join('  ·  ')+'</div>';
      h+='<div class="why">'+f.note+'</div>';
      h+='<div class="acts"><a class="act go" href="https://waze.com/ul?ll='+f.lat+','+f.lon+'&navigate=yes" target="_blank">Navigate</a>'
        +'<button class="act" data-vf="'+id+'">Conditions</button>'
        +'<a class="act" href="https://www.google.com/search?q='+encodeURIComponent(f.n+' '+(region==='Switzerland'?'klettersteig':'via ferrata')+' topo')+'" target="_blank">Topo ↗</a>'
        +(f.cond?'<a class="act" href="'+f.cond+'" target="_blank">Official status ↗</a>':'')
        +'<a class="act" href="https://www.google.com/search?q='+encodeURIComponent(f.n+' via ferrata conditions')+'" target="_blank">Reports ↗</a></div>';
      h+='<div class="vf-cond" id="cond-'+id+'"></div></div>';
    });
  });
  A.innerHTML=h;

function vfByDomId(id){let found=null;Object.keys(FERRATA).forEach(region=>{FERRATA[region].forEach((f,i)=>{if(vfDomId(region,i)===id)found=f;});});return found;}
async function ferrataConditions(id){
  const f=vfByDomId(id); const box=document.getElementById('cond-'+id); if(!f||!box)return;
  box.innerHTML='<div class="muted">Checking weather at the route…</div>';
  try{
    const u='https://api.open-meteo.com/v1/forecast?latitude='+f.lat+'&longitude='+f.lon+'&current=temperature_2m,precipitation,weather_code,wind_speed_10m&hourly=freezing_level_height&daily=precipitation_sum,weather_code,wind_speed_10m_max&forecast_days=1&timezone=auto';
    const j=await fetchJSON(u);
    const cur=j.current||{}, day=j.daily||{};
    const code=cur.weather_code, dcode=(day.weather_code||[])[0];
    const storm=[95,96,99].includes(code)||[95,96,99].includes(dcode);
    const precipDay=(day.precipitation_sum||[])[0]||0;
    const wet=(cur.precipitation||0)>0||precipDay>=1||code>=51;
    const windMax=Math.round((day.wind_speed_10m_max||[])[0]||cur.wind_speed_10m||0);
    const fl=Math.round(((j.hourly&&j.hourly.freezing_level_height)||[])[0]||0);
    let verdict,cls;
    if(storm){verdict='Thunderstorm risk today — do not be on the cables. Postpone.';cls='vf-bad';}
    else if(wet){verdict='Wet — rock and cables slippery, high fall risk. Better another day.';cls='vf-bad';}
    else if(windMax>=45){verdict='Windy ('+windMax+' km/h) — exposed sections will be unpleasant; consider postponing.';cls='vf-warn';}
    else{verdict='Weather looks workable. Still confirm the rock is dry and no afternoon storms before you commit.';cls='vf-ok';}
    box.innerHTML='<div class="vf-verdict '+cls+'">'+verdict+'</div>'
      +'<div class="vf-wx">'+Math.round(cur.temperature_2m)+'°C now · wind to '+windMax+' km/h · rain today '+precipDay.toFixed(1)+' mm · freezing level ~'+fl+' m</div>'
      +'<div class="muted" style="margin-top:6px">Weather-based guidance only — not an open/closed status. Check seasonal closures and recent snow locally'+(f.cond?' (official page linked above)':'')+'.</div>';
  }catch(e){
    box.innerHTML='<div class="vf-verdict vf-bad">Couldn\u2019t reach the weather service — needs a connection. Use the Reports link or check locally.</div>';
  }
}

/* ===== ROUTE (countries + departure + weather grid + currency) ===== */
function countdownText(){
  if(!depDate)return '';
  const t=new Date(depDate+'T00:00:00'); const now=new Date(); now.setHours(0,0,0,0);
  const d=Math.round((t-now)/86400000);
  if(d>0)return d+' day'+(d===1?'':'s')+' to go';
  if(d===0)return 'Departing today';
  return Math.abs(d)+' day'+(Math.abs(d)===1?'':'s')+' into the trip';
}
function updateHeader(){
  const base='UK → FR → CH → IT → home';
  const cd=countdownText();
  document.getElementById('subhead').innerHTML=cd?(base+' · <b>'+cd+'</b>'):base;
}

document.addEventListener('click',e=>{
  const t=e.target;

  if((a=t.closest&&t.closest('[data-f]'))){S.filter=a.getAttribute('data-f');save();render();return;}
  if(t.id==='reset'){if(confirm('Reset cached weather, finds and settings?')){localStorage.removeItem(KEY);location.reload();}return;}
});
document.addEventListener('change',e=>{if(e.target.id==='regsel'){S.region=e.target.value;S.wx=null;save();render();loadWx();}});

let wxFailed=false;
function loadWx(){const m=regionMeta(S.region);if(!m||m.lat==null)return;fetchWx(m).then(w=>{if(w){S.wx=w;wxFailed=false;}else{wxFailed=true;}save();if(S.tab==='now')render();});}
let geoBusy=false, geoMsg='';
function useGeo(){
  if(geoBusy)return;
  if(!navigator.geolocation){geoMsg='This browser has no location support — pick your region from the list.';render();return;}
  if(window.isSecureContext===false){geoMsg='Location only works on the hosted (https) version — pick your region from the list for now.';render();return;}
  geoBusy=true; geoMsg='Locating…'; render();
  navigator.geolocation.getCurrentPosition(function(p){
    let best=REGIONS[0],bd=1e9;
    REGIONS.forEach(function(r){if(r.lat==null)return;const d=Math.hypot(r.lat-p.coords.latitude,r.lon-p.coords.longitude);if(d<bd){bd=d;best=r;}});
    geoBusy=false; geoMsg='Nearest region set: '+best.name;
    S.region=best.name; S.wx=null; save(); render(); loadWx();
  },function(err){
    geoBusy=false;
    geoMsg = (err&&err.code===1) ? 'Location permission was denied — allow it for this site in your browser, or pick your region from the list.'
           : (err&&err.code===3) ? 'Location timed out — try again, or pick your region from the list.'
           : 'Couldn\u2019t get a location fix — pick your region from the list.';
    render();
  },{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}
